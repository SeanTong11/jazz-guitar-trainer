<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Jazz Guitar Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Righteous&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </div>
        <div>
          <h1 class="app-title">Jazz Guitar</h1>
          <span class="app-subtitle">Trainer</span>
        </div>
      </div>
      <nav class="sidebar-nav" id="mainNav">
        <button class="nav-btn active" data-mod="noteDegree">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          <span>音名 / 级数</span>
        </button>
        <button class="nav-btn" data-mod="fretboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 8h20M2 12h20M2 16h20M8 4v16M14 4v16"/></svg>
          <span>指板音阶</span>
        </button>
        <button class="nav-btn" data-mod="chordDiagram">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          <span>和弦图表</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <span class="version-tag">v1.0</span>
      </div>
    </aside>
    <main class="app-main">
      <div id="mod-noteDegree" class="module active"></div>
      <div id="mod-fretboard" class="module"></div>
      <div id="mod-chordDiagram" class="module"></div>
    </main>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
